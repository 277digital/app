<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>277 App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #e5e7eb, #d1d5db);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MAIN WRAPPER */
.wrapper {
    width: 1200px;
    height: 720px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    display: flex;
    box-shadow: 0 30px 80px rgba(0,0,0,0.15);
    overflow: hidden;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    padding: 30px;
    border-right: 1px solid rgba(0,0,0,0.05);
}

/* PROFILE */
.profile {
    display: flex;
    align-items: center;
    margin-bottom: 40px;
}

.profile img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    margin-right: 12px;
}

.profile div {
    font-size: 14px;
}

/* MENU */
.menu div {
    padding: 12px 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.menu div:hover {
    background: rgba(0,0,0,0.05);
}

.menu .active {
    background: white;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* CONTENT */
.content {
    flex: 1;
    padding: 40px;
}

/* HEADER */
.header {
    margin-bottom: 30px;
}

.header h1 {
    font-size: 32px;
}

.header p {
    color: #6b7280;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* BIG NUMBER */
.big {
    font-size: 48px;
    font-weight: 700;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 16px;
    border-radius: 10px;
    background: #111827;
    color: white;
    text-decoration: none;
    font-size: 14px;
}

/* LIST */
.list {
    margin-top: 15px;
}

.list div {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="profile">
            <img src="https://i.pravatar.cc/100">
            <div>
                <strong>277 Digital</strong><br>
                admin@277digital.com
            </div>
        </div>

        <div class="menu">
            <div class="active">Dashboard</div>
            <div>Clients</div>
            <div>Services</div>
            <div>Invoices</div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="header">
            <h1>Dashboard233</h1>
            <p>Overview of your business</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Total Invoices</h3>
                <div class="big">12</div>
                <a class="btn">View</a>
            </div>

            <div class="card">
                <h3>Total Revenue</h3>
                <div class="big">€2,450</div>
                <a class="btn">Details</a>
            </div>
        </div>

        <div class="card" style="margin-top:20px;">
            <h3>Recent Activity</h3>

            <div class="list">
                <div>Invoice #001 created</div>
                <div>Client added</div>
                <div>Service updated</div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
